name: CD - GCP Firestore Database (Apply / Destroy)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      project_id:
        description: GCP project ID
        required: true
        type: string
      region:
        description: "GCP region (Free Tier: us-west1, us-central1, us-east1)"
        required: true
        type: string
        default: us-central1
      database_id:
        description: Firestore database ID
        required: true
        type: string
        default: default
      database_type:
        description: Firestore type (FIRESTORE_NATIVE or DATASTORE_MODE)
        required: true
        type: string
        default: FIRESTORE_NATIVE

env: {}

jobs:
  provision:
    name: Terraform ${{ github.event.inputs.command }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: |
          terraform plan ${{ github.event.inputs.command == 'destroy' && '-destroy' || '' }} \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="database_id=${{ github.event.inputs.database_id }}" \
            -var="database_type=${{ github.event.inputs.database_type }}"
      - name: Terraform Apply / Destroy
        run: |
          terraform ${{ github.event.inputs.command }} -auto-approve \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="database_id=${{ github.event.inputs.database_id }}" \
            -var="database_type=${{ github.event.inputs.database_type }}"
